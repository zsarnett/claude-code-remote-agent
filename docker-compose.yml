services:
  workstation-postgres:
    image: postgres:16-alpine
    container_name: workstation-postgres
    command:
      - postgres
      - -c
      - max_connections=40
    cpus: 2.0
    environment:
      POSTGRES_DB: workstation
      POSTGRES_USER: workstation
      POSTGRES_PASSWORD: workstation
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1g
    ports:
      - "5433:5432"
    volumes:
      - workstation-postgres-data:/var/lib/postgresql/data
      - ./db/init-workstation.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workstation"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  workstation-postgres-data:
